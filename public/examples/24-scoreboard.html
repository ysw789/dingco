<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>랭킹</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0f172a; font-family: sans-serif; color: white; padding: 24px; }
  h2 { font-size: 22px; font-weight: 900; margin-bottom: 24px; }
  .podium { display: flex; align-items: flex-end; gap: 12px; margin-bottom: 28px; }
  .pod { text-align: center; }
  .pod-avatar { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; margin: 0 auto 6px; }
  .pod-name { font-size: 12px; margin-bottom: 6px; }
  .pod-block { width: 80px; display: flex; align-items: flex-end; justify-content: center; border-radius: 8px 8px 0 0; font-size: 20px; font-weight: 900; }
  .list { width: 360px; }
  .row { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: #1e293b; border-radius: 10px; margin-bottom: 8px; }
  .rank { width: 24px; font-size: 14px; font-weight: bold; color: #64748b; text-align: center; }
  .user-avatar { width: 36px; height: 36px; border-radius: 50%; background: #334155; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .user-name { flex: 1; font-size: 14px; font-weight: 600; }
  .score { font-size: 14px; font-weight: bold; color: #fbbf24; }
</style>
</head>
<body>
  <h2>🏆 리더보드</h2>
  <div class="podium">
    <div class="pod">
      <div class="pod-avatar" style="background:#cbd5e1">🥈</div>
      <div class="pod-name">이민준</div>
      <div class="pod-block" style="height:60px;background:#64748b">2위</div>
    </div>
    <div class="pod">
      <div class="pod-avatar" style="background:#fef3c7">🥇</div>
      <div class="pod-name">김강태</div>
      <div class="pod-block" style="height:90px;background:#f59e0b">1위</div>
    </div>
    <div class="pod">
      <div class="pod-avatar" style="background:#fde8d8">🥉</div>
      <div class="pod-name">박지수</div>
      <div class="pod-block" style="height:45px;background:#b45309">3위</div>
    </div>
  </div>
  <div class="list">
    <div class="row">
      <div class="rank">4</div>
      <div class="user-avatar">👤</div>
      <div class="user-name">최승완</div>
      <div class="score">8,420점</div>
    </div>
    <div class="row">
      <div class="rank">5</div>
      <div class="user-avatar">👤</div>
      <div class="user-name">정진국</div>
      <div class="score">7,890점</div>
    </div>
    <div class="row">
      <div class="rank">6</div>
      <div class="user-avatar">👤</div>
      <div class="user-name">한서연</div>
      <div class="score">7,210점</div>
    </div>
  </div>
</body>
</html>
