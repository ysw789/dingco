<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>로그인</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f0f2f5;
    font-family: sans-serif;
  }
  .card {
    background: white;
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.1);
    width: 320px;
  }
  h2 { text-align: center; margin-bottom: 24px; color: #111; }
  label { font-size: 13px; color: #555; display: block; margin-bottom: 4px; }
  input {
    width: 100%; padding: 10px 12px;
    border: 1px solid #ddd; border-radius: 8px;
    font-size: 14px; margin-bottom: 16px; outline: none;
  }
  button {
    width: 100%; padding: 12px;
    background: #4f46e5; color: white;
    border: none; border-radius: 8px;
    font-size: 15px; font-weight: bold; cursor: pointer;
  }
  .link { text-align: center; margin-top: 16px; font-size: 13px; color: #888; }
  .link a { color: #4f46e5; text-decoration: none; }
</style>
</head>
<body>
  <div class="card">
    <h2>로그인</h2>
    <label>이메일</label>
    <input type="email" placeholder="이메일을 입력하세요">
    <label>비밀번호</label>
    <input type="password" placeholder="비밀번호를 입력하세요">
    <button>로그인</button>
    <div class="link">계정이 없으신가요? <a href="#">회원가입</a></div>
  </div>
</body>
</html>
