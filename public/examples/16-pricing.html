<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>가격 플랜</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #f8fafc; font-family: sans-serif; padding: 20px; }
  h2 { font-size: 24px; font-weight: 900; color: #0f172a; margin-bottom: 6px; }
  .sub { font-size: 14px; color: #64748b; margin-bottom: 32px; }
  .plans { display: flex; gap: 16px; }
  .plan { background: white; border-radius: 16px; padding: 28px 24px; width: 200px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); border: 2px solid transparent; }
  .plan.best { border-color: #6366f1; position: relative; }
  .best-badge { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); background: #6366f1; color: white; font-size: 11px; font-weight: bold; padding: 3px 12px; border-radius: 20px; white-space: nowrap; }
  .plan-name { font-size: 13px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
  .price { font-size: 36px; font-weight: 900; color: #0f172a; }
  .price span { font-size: 14px; color: #94a3b8; font-weight: 400; }
  .features { margin: 20px 0; display: flex; flex-direction: column; gap: 8px; }
  .feat { font-size: 13px; color: #475569; }
  .feat::before { content: '✓ '; color: #22c55e; font-weight: bold; }
  .btn { width: 100%; padding: 10px; border-radius: 8px; font-size: 13px; font-weight: bold; cursor: pointer; border: none; }
  .btn-outline { background: white; color: #6366f1; border: 1.5px solid #6366f1; }
  .btn-fill { background: #6366f1; color: white; }
</style>
</head>
<body>
  <h2>플랜 선택</h2>
  <div class="sub">지금 시작하세요, 언제든 변경 가능</div>
  <div class="plans">
    <div class="plan">
      <div class="plan-name">Basic</div>
      <div class="price">무료<span>/월</span></div>
      <div class="features">
        <div class="feat">프로젝트 3개</div>
        <div class="feat">1GB 저장소</div>
        <div class="feat">기본 지원</div>
      </div>
      <button class="btn btn-outline">시작하기</button>
    </div>
    <div class="plan best">
      <div class="best-badge">인기</div>
      <div class="plan-name">Pro</div>
      <div class="price">9,900<span>원/월</span></div>
      <div class="features">
        <div class="feat">프로젝트 무제한</div>
        <div class="feat">100GB 저장소</div>
        <div class="feat">우선 지원</div>
      </div>
      <button class="btn btn-fill">업그레이드</button>
    </div>
  </div>
</body>
</html>
