<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>투두리스트</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f9fafb;
    font-family: sans-serif;
  }
  .app {
    background: white;
    border-radius: 16px;
    padding: 32px;
    width: 360px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.08);
  }
  h2 { font-size: 20px; font-weight: bold; color: #111; margin-bottom: 20px; }
  .input-row { display: flex; gap: 8px; margin-bottom: 20px; }
  input {
    flex: 1; padding: 10px 12px;
    border: 1px solid #e5e7eb; border-radius: 8px;
    font-size: 14px; outline: none;
  }
  .add-btn {
    padding: 10px 16px;
    background: #4f46e5; color: white;
    border: none; border-radius: 8px;
    font-weight: bold; cursor: pointer;
  }
  .item {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 0;
    border-bottom: 1px solid #f3f4f6;
    font-size: 14px; color: #333;
  }
  .item input[type=checkbox] { width: 16px; height: 16px; accent-color: #4f46e5; }
  .done { text-decoration: line-through; color: #aaa; }
</style>
</head>
<body>
  <div class="app">
    <h2>오늘 할 일</h2>
    <div class="input-row">
      <input placeholder="할 일 추가...">
      <button class="add-btn">추가</button>
    </div>
    <div class="item"><input type="checkbox" checked><span class="done">아침 운동하기</span></div>
    <div class="item"><input type="checkbox"><span>프로젝트 발표 준비</span></div>
    <div class="item"><input type="checkbox"><span>장보기</span></div>
    <div class="item"><input type="checkbox"><span>독서 30분</span></div>
  </div>
</body>
</html>
