<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>팀 소개</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #f8fafc; font-family: sans-serif; padding: 24px; }
  h2 { font-size: 22px; font-weight: 900; color: #0f172a; margin-bottom: 4px; }
  .sub { font-size: 13px; color: #64748b; margin-bottom: 28px; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .card { background: white; border-radius: 14px; padding: 20px 16px; text-align: center; box-shadow: 0 1px 8px rgba(0,0,0,0.06); }
  .avatar { width: 56px; height: 56px; border-radius: 50%; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 26px; }
  .name { font-size: 14px; font-weight: bold; color: #0f172a; margin-bottom: 3px; }
  .role { font-size: 11px; color: #64748b; margin-bottom: 10px; }
  .tags { display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; }
  .tag { background: #f1f5f9; color: #475569; font-size: 10px; padding: 2px 7px; border-radius: 10px; }
</style>
</head>
<body>
  <h2>우리 팀</h2>
  <div class="sub">함께 만들어가는 사람들</div>
  <div class="grid">
    <div class="card">
      <div class="avatar" style="background:#ede9fe">👨‍💻</div>
      <div class="name">김강태</div>
      <div class="role">Frontend Dev</div>
      <div class="tags"><span class="tag">React</span><span class="tag">Next.js</span></div>
    </div>
    <div class="card">
      <div class="avatar" style="background:#dcfce7">👩‍🎨</div>
      <div class="name">이지수</div>
      <div class="role">UI/UX Designer</div>
      <div class="tags"><span class="tag">Figma</span><span class="tag">Motion</span></div>
    </div>
    <div class="card">
      <div class="avatar" style="background:#dbeafe">👨‍🔧</div>
      <div class="name">박진국</div>
      <div class="role">Backend Dev</div>
      <div class="tags"><span class="tag">Node</span><span class="tag">DB</span></div>
    </div>
    <div class="card">
      <div class="avatar" style="background:#fef3c7">👩‍💼</div>
      <div class="name">최승완</div>
      <div class="role">PM</div>
      <div class="tags"><span class="tag">기획</span><span class="tag">스크럼</span></div>
    </div>
    <div class="card">
      <div class="avatar" style="background:#fce7f3">👨‍📊</div>
      <div class="name">정민준</div>
      <div class="role">Data Engineer</div>
      <div class="tags"><span class="tag">Python</span><span class="tag">ML</span></div>
    </div>
    <div class="card">
      <div class="avatar" style="background:#f3f4f6">👩‍🔬</div>
      <div class="name">한서연</div>
      <div class="role">QA Engineer</div>
      <div class="tags"><span class="tag">테스트</span><span class="tag">자동화</span></div>
    </div>
  </div>
</body>
</html>
