<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>지도</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { height: 100vh; display: flex; align-items: center; justify-content: center; background: #f1f5f9; font-family: sans-serif; }
  .app { width: 420px; height: 500px; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.12); display: flex; flex-direction: column; }
  .search-bar { padding: 14px 16px; display: flex; gap: 10px; align-items: center; border-bottom: 1px solid #f1f5f9; }
  .search-input { flex: 1; display: flex; align-items: center; gap: 8px; background: #f8fafc; border-radius: 10px; padding: 10px 14px; }
  .search-input input { border: none; background: none; outline: none; font-size: 14px; flex: 1; }
  .map { flex: 1; background: #e8f4e8; position: relative; overflow: hidden; }
  .grid-h { position: absolute; width: 100%; border-top: 1px solid #d1e8d1; }
  .grid-v { position: absolute; height: 100%; border-left: 1px solid #d1e8d1; }
  .road-h { position: absolute; background: white; }
  .road-v { position: absolute; background: white; }
  .pin { position: absolute; font-size: 28px; transform: translate(-50%, -100%); }
  .info-card { padding: 14px 16px; border-top: 1px solid #f1f5f9; display: flex; align-items: center; gap: 12px; }
  .place-icon { width: 44px; height: 44px; background: #eff6ff; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
  .place-name { font-size: 15px; font-weight: bold; color: #0f172a; margin-bottom: 2px; }
  .place-addr { font-size: 12px; color: #64748b; }
  .nav-btn { padding: 8px 16px; background: #3b82f6; color: white; border: none; border-radius: 8px; font-size: 13px; font-weight: bold; cursor: pointer; white-space: nowrap; }
</style>
</head>
<body>
  <div class="app">
    <div class="search-bar">
      <div class="search-input"><span>🔍</span><input value="홍대입구역" readonly></div>
    </div>
    <div class="map">
      <div class="grid-h" style="top:25%"></div><div class="grid-h" style="top:50%"></div><div class="grid-h" style="top:75%"></div>
      <div class="grid-v" style="left:33%"></div><div class="grid-v" style="left:66%"></div>
      <div class="road-h" style="top:calc(50% - 6px);width:100%;height:12px"></div>
      <div class="road-v" style="left:calc(40% - 6px);height:100%;width:12px"></div>
      <div class="road-h" style="top:calc(25% - 4px);width:100%;height:8px"></div>
      <div class="road-v" style="left:calc(70% - 4px);height:100%;width:8px"></div>
      <div class="pin" style="left:40%;top:50%">📍</div>
    </div>
    <div class="info-card">
      <div class="place-icon">🚇</div>
      <div style="flex:1">
        <div class="place-name">홍대입구역 2번 출구</div>
        <div class="place-addr">서울 마포구 양화로 160</div>
      </div>
      <button class="nav-btn">길찾기</button>
    </div>
  </div>
</body>
</html>
