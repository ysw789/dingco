<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>채팅</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { height: 100vh; display: flex; align-items: center; justify-content: center; background: #e5ddd5; font-family: sans-serif; }
  .chat { width: 360px; height: 500px; background: white; border-radius: 16px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 4px 24px rgba(0,0,0,0.15); }
  .header { background: #075e54; color: white; padding: 14px 16px; display: flex; align-items: center; gap: 10px; }
  .avatar { width: 38px; height: 38px; border-radius: 50%; background: #25d366; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .name { font-weight: bold; font-size: 15px; }
  .online { font-size: 11px; color: #a8d5b5; }
  .msgs { flex: 1; padding: 14px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; background: #e5ddd5; }
  .bubble { max-width: 75%; padding: 8px 12px; border-radius: 10px; font-size: 13px; line-height: 1.4; }
  .them { background: white; align-self: flex-start; border-top-left-radius: 2px; }
  .me { background: #dcf8c6; align-self: flex-end; border-top-right-radius: 2px; }
  .time { font-size: 10px; color: #999; text-align: right; margin-top: 3px; }
  .input-bar { padding: 10px; display: flex; gap: 8px; border-top: 1px solid #eee; }
  input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 20px; font-size: 14px; outline: none; }
  .send { width: 40px; height: 40px; background: #25d366; border: none; border-radius: 50%; color: white; font-size: 16px; cursor: pointer; }
</style>
</head>
<body>
  <div class="chat">
    <div class="header">
      <div class="avatar">👤</div>
      <div><div class="name">지수</div><div class="online">온라인</div></div>
    </div>
    <div class="msgs">
      <div class="bubble them">안녕! 오늘 약속 몇 시야?<div class="time">오후 2:14</div></div>
      <div class="bubble me">3시에 홍대역 1번 출구!<div class="time">오후 2:15</div></div>
      <div class="bubble them">ㅇㅋ 나 10분 늦을 것 같아<div class="time">오후 2:16</div></div>
      <div class="bubble me">괜찮아 나도 이제 출발할게<div class="time">오후 2:17</div></div>
    </div>
    <div class="input-bar">
      <input placeholder="메시지 입력...">
      <button class="send">➤</button>
    </div>
  </div>
</body>
</html>
