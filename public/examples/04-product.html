<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>상품 카드</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f3f4f6;
    font-family: sans-serif;
  }
  .card {
    background: white;
    border-radius: 16px;
    overflow: hidden;
    width: 260px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  }
  .img {
    height: 200px;
    background: linear-gradient(135deg, #a5b4fc, #818cf8);
    display: flex; align-items: center; justify-content: center;
    font-size: 64px;
  }
  .info { padding: 20px; }
  .name { font-size: 16px; font-weight: bold; color: #111; margin-bottom: 4px; }
  .desc { font-size: 12px; color: #888; margin-bottom: 12px; }
  .price-row { display: flex; align-items: center; justify-content: space-between; }
  .price { font-size: 20px; font-weight: bold; color: #4f46e5; }
  .cart-btn {
    padding: 8px 16px;
    background: #4f46e5; color: white;
    border: none; border-radius: 8px;
    font-size: 13px; font-weight: bold; cursor: pointer;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="img">👟</div>
    <div class="info">
      <div class="name">에어 클래식 스니커즈</div>
      <div class="desc">가볍고 편안한 데일리 운동화</div>
      <div class="price-row">
        <span class="price">89,000원</span>
        <button class="cart-btn">장바구니</button>
      </div>
    </div>
  </div>
</body>
</html>
