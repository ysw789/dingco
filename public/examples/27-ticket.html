<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>티켓</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { height: 100vh; display: flex; align-items: center; justify-content: center; background: #1e1b4b; font-family: sans-serif; }
  .ticket { width: 340px; background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 8px 40px rgba(0,0,0,0.3); }
  .top { background: linear-gradient(135deg, #6366f1, #8b5cf6); padding: 28px 24px; color: white; }
  .event-type { font-size: 11px; font-weight: bold; letter-spacing: 2px; opacity: 0.8; margin-bottom: 8px; }
  .event-name { font-size: 22px; font-weight: 900; margin-bottom: 4px; }
  .event-sub { font-size: 13px; opacity: 0.8; }
  .divider { display: flex; align-items: center; position: relative; }
  .divider::before, .divider::after { content: ''; width: 28px; height: 28px; background: #1e1b4b; border-radius: 50%; flex-shrink: 0; }
  .dashes { flex: 1; border-top: 2px dashed #e2e8f0; }
  .bottom { padding: 20px 24px; }
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
  .info-label { font-size: 11px; color: #94a3b8; margin-bottom: 4px; }
  .info-val { font-size: 14px; font-weight: bold; color: #0f172a; }
  .barcode { background: #f8fafc; border-radius: 10px; padding: 16px; text-align: center; }
  .barcode-lines { display: flex; gap: 2px; justify-content: center; align-items: flex-end; height: 40px; margin-bottom: 8px; }
  .bar { background: #0f172a; border-radius: 1px; }
  .barcode-num { font-size: 12px; color: #94a3b8; letter-spacing: 3px; }
</style>
</head>
<body>
  <div class="ticket">
    <div class="top">
      <div class="event-type">CONCERT TICKET</div>
      <div class="event-name">2026 COSMOS LIVE</div>
      <div class="event-sub">DJ Cosmos · 월드투어 서울 공연</div>
    </div>
    <div class="divider"><div class="dashes"></div></div>
    <div class="bottom">
      <div class="info-grid">
        <div><div class="info-label">날짜</div><div class="info-val">2026.04.12</div></div>
        <div><div class="info-label">시간</div><div class="info-val">오후 7:00</div></div>
        <div><div class="info-label">장소</div><div class="info-val">올림픽공원</div></div>
        <div><div class="info-label">좌석</div><div class="info-val">B구역 14열 7번</div></div>
      </div>
      <div class="barcode">
        <div class="barcode-lines">
          <div class="bar" style="width:2px;height:36px"></div><div class="bar" style="width:4px;height:28px"></div><div class="bar" style="width:2px;height:36px"></div><div class="bar" style="width:3px;height:20px"></div><div class="bar" style="width:2px;height:36px"></div><div class="bar" style="width:5px;height:32px"></div><div class="bar" style="width:2px;height:36px"></div><div class="bar" style="width:3px;height:24px"></div><div class="bar" style="width:2px;height:36px"></div><div class="bar" style="width:4px;height:30px"></div><div class="bar" style="width:2px;height:36px"></div><div class="bar" style="width:3px;height:28px"></div><div class="bar" style="width:2px;height:36px"></div>
        </div>
        <div class="barcode-num">2026 0412 1400 7</div>
      </div>
    </div>
  </div>
</body>
</html>
