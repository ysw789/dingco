<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>설정</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { height: 100vh; display: flex; align-items: center; justify-content: center; background: #f8fafc; font-family: sans-serif; }
  .panel { background: white; border-radius: 16px; width: 380px; overflow: hidden; box-shadow: 0 2px 16px rgba(0,0,0,0.08); }
  .header { padding: 18px 20px; border-bottom: 1px solid #f1f5f9; }
  .header h3 { font-size: 17px; font-weight: bold; color: #0f172a; }
  .section-label { font-size: 11px; font-weight: bold; color: #94a3b8; letter-spacing: 1px; text-transform: uppercase; padding: 14px 20px 6px; }
  .item { display: flex; align-items: center; padding: 14px 20px; border-bottom: 1px solid #f8fafc; gap: 12px; }
  .item-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .item-label { flex: 1; font-size: 14px; color: #0f172a; }
  .item-sub { font-size: 12px; color: #94a3b8; margin-top: 2px; }
  .toggle { width: 44px; height: 24px; background: #22c55e; border-radius: 12px; position: relative; cursor: pointer; flex-shrink: 0; }
  .toggle::after { content: ''; width: 20px; height: 20px; background: white; border-radius: 50%; position: absolute; top: 2px; right: 2px; }
  .toggle.off { background: #e2e8f0; }
  .toggle.off::after { right: auto; left: 2px; }
  .arrow { color: #cbd5e1; font-size: 18px; }
  .item-val { font-size: 13px; color: #64748b; }
</style>
</head>
<body>
  <div class="panel">
    <div class="header"><h3>설정</h3></div>
    <div class="section-label">알림</div>
    <div class="item"><div class="item-icon" style="background:#fef3c7">🔔</div><div style="flex:1"><div class="item-label">푸시 알림</div><div class="item-sub">새 메시지 및 업데이트</div></div><div class="toggle"></div></div>
    <div class="item"><div class="item-icon" style="background:#ede9fe">✉️</div><div style="flex:1"><div class="item-label">이메일 알림</div><div class="item-sub">주간 요약 메일</div></div><div class="toggle off"></div></div>
    <div class="section-label">화면</div>
    <div class="item"><div class="item-icon" style="background:#f1f5f9">🌙</div><div class="item-label">다크 모드</div><div class="toggle off"></div></div>
    <div class="item"><div class="item-icon" style="background:#f1f5f9">🔤</div><div style="flex:1"><div class="item-label">언어</div></div><div class="item-val">한국어</div><div class="arrow">›</div></div>
    <div class="section-label">계정</div>
    <div class="item"><div class="item-icon" style="background:#fee2e2">🚪</div><div class="item-label" style="color:#ef4444">로그아웃</div></div>
  </div>
</body>
</html>
