<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>404</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0f172a; font-family: sans-serif; color: white; text-align: center; }
  .code { font-size: 120px; font-weight: 900; color: #334155; line-height: 1; }
  .emoji { font-size: 60px; margin: 16px 0; }
  h2 { font-size: 24px; font-weight: bold; margin-bottom: 10px; }
  p { font-size: 14px; color: #64748b; margin-bottom: 32px; }
  a { padding: 12px 28px; background: #6366f1; color: white; border-radius: 8px; text-decoration: none; font-size: 14px; font-weight: bold; }
</style>
</head>
<body>
  <div class="code">404</div>
  <div class="emoji">🌌</div>
  <h2>페이지를 찾을 수 없어요</h2>
  <p>요청하신 페이지가 존재하지 않거나 이동되었습니다.</p>
  <a href="#">홈으로 돌아가기</a>
</body>
</html>
