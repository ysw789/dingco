<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>포트폴리오</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { height: 100vh; display: flex; align-items: center; justify-content: center; background: #09090b; font-family: sans-serif; color: white; }
  .container { max-width: 480px; padding: 32px; }
  .top { display: flex; align-items: center; gap: 20px; margin-bottom: 28px; }
  .avatar { width: 72px; height: 72px; border-radius: 50%; background: linear-gradient(135deg, #6366f1, #8b5cf6); display: flex; align-items: center; justify-content: center; font-size: 32px; flex-shrink: 0; }
  .name { font-size: 22px; font-weight: 900; }
  .title { font-size: 13px; color: #71717a; margin-top: 3px; }
  .links { display: flex; gap: 8px; margin-top: 8px; }
  .link { font-size: 12px; color: #a1a1aa; padding: 3px 10px; border: 1px solid #3f3f46; border-radius: 20px; }
  .bio { font-size: 14px; color: #a1a1aa; line-height: 1.7; margin-bottom: 24px; }
  .section { font-size: 11px; font-weight: bold; letter-spacing: 2px; color: #52525b; text-transform: uppercase; margin-bottom: 12px; }
  .projects { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; }
  .proj { background: #18181b; border: 1px solid #27272a; border-radius: 10px; padding: 14px; }
  .proj-name { font-size: 13px; font-weight: bold; margin-bottom: 4px; }
  .proj-desc { font-size: 11px; color: #71717a; margin-bottom: 8px; }
  .proj-tags { display: flex; gap: 4px; flex-wrap: wrap; }
  .proj-tag { font-size: 10px; background: #27272a; color: #a1a1aa; padding: 2px 7px; border-radius: 6px; }
  .skills { display: flex; flex-wrap: wrap; gap: 8px; }
  .skill { background: #18181b; border: 1px solid #27272a; color: #a1a1aa; font-size: 12px; padding: 4px 12px; border-radius: 20px; }
</style>
</head>
<body>
  <div class="container">
    <div class="top">
      <div class="avatar">🧑‍💻</div>
      <div>
        <div class="name">김강태</div>
        <div class="title">Frontend Engineer</div>
        <div class="links"><span class="link">GitHub</span><span class="link">Velog</span><span class="link">Resume</span></div>
      </div>
    </div>
    <div class="bio">React와 Next.js를 좋아하는 프론트엔드 개발자입니다. 사용자 경험을 중시하며 깔끔한 코드를 작성하려 노력합니다.</div>
    <div class="section">프로젝트</div>
    <div class="projects">
      <div class="proj"><div class="proj-name">말안듣는 AI IDE</div><div class="proj-desc">반대로 구현하는 게임</div><div class="proj-tags"><span class="proj-tag">Next.js</span><span class="proj-tag">STT</span></div></div>
      <div class="proj"><div class="proj-name">LLM Chat UI</div><div class="proj-desc">AI 채팅 인터페이스</div><div class="proj-tags"><span class="proj-tag">React</span><span class="proj-tag">AI</span></div></div>
    </div>
    <div class="section">기술</div>
    <div class="skills"><span class="skill">React</span><span class="skill">Next.js</span><span class="skill">TypeScript</span><span class="skill">Tailwind</span><span class="skill">Node.js</span></div>
  </div>
</body>
</html>
