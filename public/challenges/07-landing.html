<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>랜딩 페이지</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: white;
    font-family: sans-serif;
    text-align: center;
    padding: 32px;
  }
  .badge {
    display: inline-block;
    background: #ede9fe; color: #7c3aed;
    font-size: 12px; font-weight: bold;
    padding: 4px 12px; border-radius: 20px;
    margin-bottom: 20px; letter-spacing: 1px;
  }
  h1 { font-size: 42px; font-weight: 900; color: #111; line-height: 1.2; margin-bottom: 16px; }
  h1 span { color: #7c3aed; }
  p { font-size: 16px; color: #666; max-width: 400px; margin: 0 auto 32px; line-height: 1.6; }
  .btns { display: flex; gap: 12px; justify-content: center; }
  .primary {
    padding: 14px 28px;
    background: #7c3aed; color: white;
    border: none; border-radius: 10px;
    font-size: 15px; font-weight: bold; cursor: pointer;
  }
  .secondary {
    padding: 14px 28px;
    background: white; color: #7c3aed;
    border: 2px solid #7c3aed; border-radius: 10px;
    font-size: 15px; font-weight: bold; cursor: pointer;
  }
</style>
</head>
<body>
  <div class="badge">✨ 새로운 서비스 출시</div>
  <h1>더 빠르게, <br><span>더 스마트하게</span></h1>
  <p>당신의 업무를 혁신하는 AI 플랫폼. 지금 바로 시작해보세요.</p>
  <div class="btns">
    <button class="primary">무료로 시작하기</button>
    <button class="secondary">데모 보기</button>
  </div>
</body>
</html>
