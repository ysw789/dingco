<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>알림</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { height: 100vh; display: flex; align-items: center; justify-content: center; background: #f8fafc; font-family: sans-serif; }
  .panel { width: 360px; background: white; border-radius: 16px; box-shadow: 0 2px 16px rgba(0,0,0,0.08); overflow: hidden; }
  .header { padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f1f5f9; }
  .header h3 { font-size: 16px; font-weight: bold; color: #0f172a; }
  .badge { background: #ef4444; color: white; font-size: 11px; font-weight: bold; padding: 2px 7px; border-radius: 10px; }
  .all { font-size: 12px; color: #6366f1; cursor: pointer; }
  .item { display: flex; gap: 12px; padding: 14px 20px; border-bottom: 1px solid #f8fafc; }
  .item.unread { background: #fafaff; }
  .icon { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .content .title { font-size: 13px; font-weight: 600; color: #0f172a; margin-bottom: 2px; }
  .content .desc { font-size: 12px; color: #64748b; }
  .content .time { font-size: 11px; color: #94a3b8; margin-top: 3px; }
  .dot { width: 8px; height: 8px; background: #6366f1; border-radius: 50%; margin-top: 6px; flex-shrink: 0; }
</style>
</head>
<body>
  <div class="panel">
    <div class="header">
      <h3>알림 <span class="badge">3</span></h3>
      <span class="all">모두 읽음</span>
    </div>
    <div class="item unread">
      <div class="icon" style="background:#ede9fe">💬</div>
      <div class="content" style="flex:1">
        <div class="title">새 댓글이 달렸어요</div>
        <div class="desc">민준님이 내 게시물에 댓글을 남겼습니다</div>
        <div class="time">방금 전</div>
      </div>
      <div class="dot"></div>
    </div>
    <div class="item unread">
      <div class="icon" style="background:#fef3c7">⭐</div>
      <div class="content" style="flex:1">
        <div class="title">좋아요 10개 달성!</div>
        <div class="desc">내 사진이 10명에게 좋아요를 받았습니다</div>
        <div class="time">5분 전</div>
      </div>
      <div class="dot"></div>
    </div>
    <div class="item unread">
      <div class="icon" style="background:#dcfce7">👥</div>
      <div class="content" style="flex:1">
        <div class="title">새 팔로워</div>
        <div class="desc">서연님이 팔로우하기 시작했습니다</div>
        <div class="time">1시간 전</div>
      </div>
      <div class="dot"></div>
    </div>
    <div class="item">
      <div class="icon" style="background:#f1f5f9">📢</div>
      <div class="content">
        <div class="title">업데이트 안내</div>
        <div class="desc">새로운 기능이 추가되었습니다</div>
        <div class="time">어제</div>
      </div>
    </div>
  </div>
</body>
</html>
