<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>뮤직 플레이어</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #1a1a2e;
    font-family: sans-serif;
    color: white;
  }
  .player {
    background: #16213e;
    border-radius: 24px;
    padding: 32px;
    width: 300px;
    text-align: center;
  }
  .album {
    width: 160px; height: 160px;
    background: linear-gradient(135deg, #f093fb, #f5576c);
    border-radius: 50%;
    margin: 0 auto 24px;
    display: flex; align-items: center; justify-content: center;
    font-size: 60px;
    box-shadow: 0 8px 32px rgba(240,147,251,0.4);
  }
  .title { font-size: 18px; font-weight: bold; margin-bottom: 4px; }
  .artist { font-size: 13px; color: #888; margin-bottom: 24px; }
  .bar-bg {
    height: 4px; background: #2d3561;
    border-radius: 2px; margin-bottom: 8px;
  }
  .bar-fill {
    height: 100%; width: 40%;
    background: linear-gradient(90deg, #f093fb, #f5576c);
    border-radius: 2px;
  }
  .time { display: flex; justify-content: space-between; font-size: 11px; color: #888; margin-bottom: 24px; }
  .controls { display: flex; align-items: center; justify-content: center; gap: 24px; }
  .btn { background: none; border: none; color: #888; font-size: 20px; cursor: pointer; }
  .play-btn {
    width: 52px; height: 52px;
    background: linear-gradient(135deg, #f093fb, #f5576c);
    border-radius: 50%; border: none;
    font-size: 20px; color: white; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
</style>
</head>
<body>
  <div class="player">
    <div class="album">🎵</div>
    <div class="title">Midnight Vibes</div>
    <div class="artist">DJ Cosmos</div>
    <div class="bar-bg"><div class="bar-fill"></div></div>
    <div class="time"><span>1:24</span><span>3:47</span></div>
    <div class="controls">
      <button class="btn">⏮</button>
      <button class="play-btn">▶</button>
      <button class="btn">⏭</button>
    </div>
  </div>
</body>
</html>
