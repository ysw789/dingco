<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>회원가입</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { height: 100vh; display: flex; align-items: center; justify-content: center; background: #f0f2f5; font-family: sans-serif; }
  .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 2px 16px rgba(0,0,0,0.1); width: 340px; }
  h2 { text-align: center; margin-bottom: 6px; color: #111; }
  .sub { text-align: center; font-size: 13px; color: #888; margin-bottom: 24px; }
  .row { display: flex; gap: 10px; }
  label { font-size: 13px; color: #555; display: block; margin-bottom: 4px; }
  input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; margin-bottom: 14px; outline: none; }
  button { width: 100%; padding: 12px; background: #10b981; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; }
  .agree { font-size: 12px; color: #888; text-align: center; margin-top: 14px; }
  .agree a { color: #10b981; }
</style>
</head>
<body>
  <div class="card">
    <h2>회원가입</h2>
    <div class="sub">무료로 시작하세요</div>
    <div class="row">
      <div style="flex:1"><label>이름</label><input placeholder="홍길동"></div>
      <div style="flex:1"><label>닉네임</label><input placeholder="gildong"></div>
    </div>
    <label>이메일</label><input type="email" placeholder="example@email.com">
    <label>비밀번호</label><input type="password" placeholder="8자 이상">
    <button>가입하기</button>
    <div class="agree"><a href="#">이용약관</a> 및 <a href="#">개인정보처리방침</a>에 동의합니다</div>
  </div>
</body>
</html>
