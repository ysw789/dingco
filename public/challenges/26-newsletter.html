<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>뉴스레터</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { height: 100vh; display: flex; align-items: center; justify-content: center; background: #18181b; font-family: sans-serif; }
  .card { background: #27272a; border-radius: 20px; padding: 48px 40px; width: 440px; text-align: center; border: 1px solid #3f3f46; }
  .tag { display: inline-block; background: #fef9c3; color: #854d0e; font-size: 11px; font-weight: bold; padding: 3px 10px; border-radius: 20px; margin-bottom: 16px; }
  h2 { font-size: 28px; font-weight: 900; color: white; line-height: 1.3; margin-bottom: 10px; }
  h2 span { color: #facc15; }
  p { font-size: 14px; color: #a1a1aa; line-height: 1.7; margin-bottom: 28px; }
  .input-row { display: flex; gap: 8px; margin-bottom: 16px; }
  input { flex: 1; padding: 12px 16px; background: #3f3f46; border: 1px solid #52525b; border-radius: 10px; color: white; font-size: 14px; outline: none; }
  input::placeholder { color: #71717a; }
  button { padding: 12px 20px; background: #facc15; color: #1c1917; border: none; border-radius: 10px; font-size: 14px; font-weight: bold; cursor: pointer; white-space: nowrap; }
  .count { font-size: 12px; color: #52525b; }
  .count span { color: #a1a1aa; }
</style>
</head>
<body>
  <div class="card">
    <div class="tag">✉️ 주 1회 발행</div>
    <h2>개발자를 위한<br><span>주간 뉴스레터</span></h2>
    <p>매주 월요일, 트렌드 기술 · 유용한 라이브러리 · 커리어 팁을 정리해서 보내드립니다.</p>
    <div class="input-row">
      <input placeholder="이메일 주소 입력">
      <button>구독하기</button>
    </div>
    <div class="count">현재 <span>12,400명</span>이 구독 중 · 언제든 해지 가능</div>
  </div>
</body>
</html>
