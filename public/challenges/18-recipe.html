<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>레시피</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { height: 100vh; display: flex; align-items: center; justify-content: center; background: #fff7ed; font-family: sans-serif; }
  .card { background: white; border-radius: 20px; overflow: hidden; width: 340px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
  .img { height: 160px; background: linear-gradient(135deg, #fdba74, #f97316); display: flex; align-items: center; justify-content: center; font-size: 72px; }
  .body { padding: 20px; }
  .tag { display: inline-block; background: #fff7ed; color: #ea580c; font-size: 11px; font-weight: bold; padding: 3px 10px; border-radius: 20px; margin-bottom: 10px; }
  h3 { font-size: 18px; font-weight: bold; color: #1c1917; margin-bottom: 6px; }
  .meta { display: flex; gap: 16px; margin-bottom: 16px; }
  .meta-item { font-size: 12px; color: #78716c; }
  .meta-item span { font-weight: bold; color: #1c1917; }
  .section-title { font-size: 12px; font-weight: bold; color: #ea580c; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .ingredients { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
  .ing { background: #f5f5f4; border-radius: 6px; padding: 4px 10px; font-size: 12px; color: #44403c; }
  .steps { display: flex; flex-direction: column; gap: 8px; }
  .step { display: flex; gap: 10px; font-size: 13px; color: #57534e; }
  .step-num { width: 22px; height: 22px; background: #ea580c; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; flex-shrink: 0; }
</style>
</head>
<body>
  <div class="card">
    <div class="img">🍳</div>
    <div class="body">
      <div class="tag">간단 레시피</div>
      <h3>계란 볶음밥</h3>
      <div class="meta">
        <div class="meta-item">⏱ <span>10분</span></div>
        <div class="meta-item">👤 <span>1인분</span></div>
        <div class="meta-item">🔥 <span>쉬움</span></div>
      </div>
      <div class="section-title">재료</div>
      <div class="ingredients">
        <div class="ing">밥 1공기</div><div class="ing">달걀 2개</div>
        <div class="ing">대파</div><div class="ing">간장</div><div class="ing">참기름</div>
      </div>
      <div class="section-title">조리 순서</div>
      <div class="steps">
        <div class="step"><div class="step-num">1</div><span>팬에 기름을 두르고 달걀을 볶는다</span></div>
        <div class="step"><div class="step-num">2</div><span>밥과 대파를 넣고 강불에 볶는다</span></div>
        <div class="step"><div class="step-num">3</div><span>간장과 참기름으로 간을 맞춘다</span></div>
      </div>
    </div>
  </div>
</body>
</html>
