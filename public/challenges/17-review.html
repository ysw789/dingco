<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>리뷰</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { height: 100vh; display: flex; align-items: center; justify-content: center; background: #fffbf5; font-family: sans-serif; }
  .panel { width: 380px; background: white; border-radius: 16px; padding: 28px; box-shadow: 0 2px 16px rgba(0,0,0,0.07); }
  .summary { display: flex; gap: 24px; align-items: center; margin-bottom: 24px; padding-bottom: 24px; border-bottom: 1px solid #f3f4f6; }
  .big-score { font-size: 56px; font-weight: 900; color: #0f172a; line-height: 1; }
  .stars { font-size: 20px; margin-bottom: 4px; }
  .count { font-size: 12px; color: #94a3b8; }
  .bars { flex: 1; }
  .bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; font-size: 12px; color: #64748b; }
  .bar-bg { flex: 1; height: 6px; background: #f1f5f9; border-radius: 3px; }
  .bar-fill { height: 100%; background: #f59e0b; border-radius: 3px; }
  .review { padding: 14px 0; border-bottom: 1px solid #f8fafc; }
  .review-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .reviewer { font-size: 13px; font-weight: bold; color: #0f172a; }
  .review-text { font-size: 13px; color: #64748b; line-height: 1.5; }
</style>
</head>
<body>
  <div class="panel">
    <div class="summary">
      <div><div class="big-score">4.7</div><div class="stars">⭐⭐⭐⭐⭐</div><div class="count">리뷰 128개</div></div>
      <div class="bars">
        <div class="bar-row"><span>5</span><div class="bar-bg"><div class="bar-fill" style="width:75%"></div></div><span>75%</span></div>
        <div class="bar-row"><span>4</span><div class="bar-bg"><div class="bar-fill" style="width:18%"></div></div><span>18%</span></div>
        <div class="bar-row"><span>3</span><div class="bar-bg"><div class="bar-fill" style="width:5%"></div></div><span>5%</span></div>
        <div class="bar-row"><span>2</span><div class="bar-bg"><div class="bar-fill" style="width:2%"></div></div><span>2%</span></div>
        <div class="bar-row"><span>1</span><div class="bar-bg"><div class="bar-fill" style="width:0%"></div></div><span>0%</span></div>
      </div>
    </div>
    <div class="review">
      <div class="review-header"><span class="reviewer">김민준</span><span>⭐⭐⭐⭐⭐ · 3일 전</span></div>
      <div class="review-text">정말 만족스러운 제품이에요! 배송도 빠르고 품질도 기대 이상입니다.</div>
    </div>
    <div class="review">
      <div class="review-header"><span class="reviewer">이서연</span><span>⭐⭐⭐⭐ · 1주 전</span></div>
      <div class="review-text">전반적으로 좋은데 포장이 조금 아쉬웠어요. 그래도 재구매 의사 있습니다.</div>
    </div>
  </div>
</body>
</html>
