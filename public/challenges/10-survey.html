<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>설문조사</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f0fdf4;
    font-family: sans-serif;
    padding: 24px;
  }
  .form {
    background: white;
    border-radius: 16px;
    padding: 32px;
    width: 380px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.07);
  }
  .step { font-size: 12px; color: #86efac; font-weight: bold; margin-bottom: 8px; }
  h2 { font-size: 20px; font-weight: bold; color: #111; margin-bottom: 24px; }
  .q { font-size: 14px; color: #374151; margin-bottom: 10px; font-weight: 600; }
  .options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
  label {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px;
    border: 1.5px solid #e5e7eb; border-radius: 8px;
    font-size: 14px; color: #374151; cursor: pointer;
  }
  label:hover { border-color: #22c55e; background: #f0fdf4; }
  textarea {
    width: 100%; padding: 10px 12px;
    border: 1.5px solid #e5e7eb; border-radius: 8px;
    font-size: 14px; resize: none; outline: none;
    height: 80px; margin-bottom: 20px;
  }
  .submit {
    width: 100%; padding: 12px;
    background: #22c55e; color: white;
    border: none; border-radius: 8px;
    font-size: 15px; font-weight: bold; cursor: pointer;
  }
</style>
</head>
<body>
  <div class="form">
    <div class="step">2 / 4 단계</div>
    <h2>서비스 만족도 조사</h2>
    <div class="q">전반적인 만족도는?</div>
    <div class="options">
      <label><input type="radio" name="q1"> 매우 만족</label>
      <label><input type="radio" name="q1" checked> 만족</label>
      <label><input type="radio" name="q1"> 보통</label>
      <label><input type="radio" name="q1"> 불만족</label>
    </div>
    <div class="q">개선하고 싶은 점을 적어주세요</div>
    <textarea placeholder="자유롭게 작성해주세요..."></textarea>
    <button class="submit">다음으로</button>
  </div>
</body>
</html>
