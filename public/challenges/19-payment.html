<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>결제</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { height: 100vh; display: flex; align-items: center; justify-content: center; background: #f8fafc; font-family: sans-serif; }
  .form { background: white; border-radius: 16px; padding: 32px; width: 360px; box-shadow: 0 2px 16px rgba(0,0,0,0.08); }
  h3 { font-size: 18px; font-weight: bold; color: #0f172a; margin-bottom: 4px; }
  .amount { font-size: 28px; font-weight: 900; color: #6366f1; margin-bottom: 24px; }
  label { font-size: 12px; color: #64748b; font-weight: 600; display: block; margin-bottom: 5px; }
  input { width: 100%; padding: 11px 14px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 14px; margin-bottom: 14px; outline: none; }
  .row { display: flex; gap: 12px; }
  .card-preview { background: linear-gradient(135deg, #6366f1, #8b5cf6); border-radius: 12px; padding: 16px 20px; color: white; margin-bottom: 20px; }
  .card-num { font-size: 16px; letter-spacing: 4px; margin-bottom: 12px; }
  .card-footer { display: flex; justify-content: space-between; font-size: 12px; opacity: 0.8; }
  .pay-btn { width: 100%; padding: 14px; background: #6366f1; color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: bold; cursor: pointer; }
  .secure { text-align: center; font-size: 12px; color: #94a3b8; margin-top: 12px; }
</style>
</head>
<body>
  <div class="form">
    <h3>결제 정보</h3>
    <div class="amount">39,000원</div>
    <div class="card-preview">
      <div class="card-num">1234  5678  ****  3456</div>
      <div class="card-footer"><span>KIM CHEOLSU</span><span>12/28</span></div>
    </div>
    <label>카드 번호</label>
    <input placeholder="0000 0000 0000 0000">
    <div class="row">
      <div style="flex:1"><label>유효기간</label><input placeholder="MM/YY"></div>
      <div style="flex:1"><label>CVC</label><input placeholder="000"></div>
    </div>
    <label>카드 소유자</label>
    <input placeholder="이름 입력">
    <button class="pay-btn">💳 결제하기</button>
    <div class="secure">🔒 256비트 SSL 보안 결제</div>
  </div>
</body>
</html>
