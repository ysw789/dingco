<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>달력</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { height: 100vh; display: flex; align-items: center; justify-content: center; background: #f1f5f9; font-family: sans-serif; }
  .cal { background: white; border-radius: 16px; padding: 24px; width: 320px; box-shadow: 0 2px 16px rgba(0,0,0,0.08); }
  .nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .nav h3 { font-size: 16px; font-weight: bold; color: #0f172a; }
  .nav button { background: none; border: none; font-size: 18px; color: #64748b; cursor: pointer; }
  .days-header { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; margin-bottom: 8px; }
  .days-header span { font-size: 11px; color: #94a3b8; font-weight: 600; padding: 4px 0; }
  .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
  .day { height: 36px; display: flex; align-items: center; justify-content: center; font-size: 13px; color: #334155; border-radius: 50%; cursor: pointer; }
  .day:hover { background: #f1f5f9; }
  .other { color: #cbd5e1; }
  .today { background: #6366f1; color: white; font-weight: bold; }
  .today:hover { background: #4f46e5; }
  .has-event { position: relative; }
  .has-event::after { content: ''; position: absolute; bottom: 4px; width: 4px; height: 4px; background: #f59e0b; border-radius: 50%; }
</style>
</head>
<body>
  <div class="cal">
    <div class="nav">
      <button>‹</button>
      <h3>2026년 3월</h3>
      <button>›</button>
    </div>
    <div class="days-header">
      <span style="color:#ef4444">일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span style="color:#3b82f6">토</span>
    </div>
    <div class="grid">
      <div class="day other">23</div><div class="day other">24</div><div class="day other">25</div><div class="day other">26</div><div class="day other">27</div><div class="day other">28</div><div class="day other">1</div>
      <div class="day">2</div><div class="day">3</div><div class="day">4</div><div class="day has-event">5</div><div class="day">6</div><div class="day">7</div><div class="day">8</div>
      <div class="day">9</div><div class="day">10</div><div class="day">11</div><div class="day">12</div><div class="day has-event">13</div><div class="day">14</div><div class="day">15</div>
      <div class="day">16</div><div class="day">17</div><div class="day">18</div><div class="day">19</div><div class="day">20</div><div class="day">21</div><div class="day">22</div>
      <div class="day">23</div><div class="day">24</div><div class="day">25</div><div class="day">26</div><div class="day">27</div><div class="today">28</div><div class="day">29</div>
      <div class="day">30</div><div class="day">31</div>
    </div>
  </div>
</body>
</html>
