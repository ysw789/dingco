<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>대시보드</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f1f5f9;
    font-family: sans-serif;
    padding: 24px;
  }
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; width: 420px; }
  .card {
    background: white;
    border-radius: 14px;
    padding: 20px;
    box-shadow: 0 1px 8px rgba(0,0,0,0.06);
  }
  .label { font-size: 12px; color: #94a3b8; margin-bottom: 8px; }
  .value { font-size: 28px; font-weight: bold; color: #0f172a; }
  .change { font-size: 12px; margin-top: 4px; }
  .up { color: #22c55e; }
  .down { color: #ef4444; }
  .wide { grid-column: span 2; }
  .bar-list { margin-top: 12px; }
  .bar-item { margin-bottom: 10px; }
  .bar-header { display: flex; justify-content: space-between; font-size: 12px; color: #64748b; margin-bottom: 4px; }
  .bar-bg { height: 6px; background: #e2e8f0; border-radius: 3px; }
  .bar-fill { height: 100%; background: #6366f1; border-radius: 3px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="card">
      <div class="label">총 방문자</div>
      <div class="value">12,847</div>
      <div class="change up">▲ 12% 증가</div>
    </div>
    <div class="card">
      <div class="label">매출</div>
      <div class="value">4.2M</div>
      <div class="change up">▲ 8% 증가</div>
    </div>
    <div class="card">
      <div class="label">신규 가입</div>
      <div class="value">348</div>
      <div class="change down">▼ 3% 감소</div>
    </div>
    <div class="card">
      <div class="label">만족도</div>
      <div class="value">94%</div>
      <div class="change up">▲ 2% 증가</div>
    </div>
    <div class="card wide">
      <div class="label">채널별 유입</div>
      <div class="bar-list">
        <div class="bar-item">
          <div class="bar-header"><span>검색</span><span>45%</span></div>
          <div class="bar-bg"><div class="bar-fill" style="width:45%"></div></div>
        </div>
        <div class="bar-item">
          <div class="bar-header"><span>소셜</span><span>30%</span></div>
          <div class="bar-bg"><div class="bar-fill" style="width:30%"></div></div>
        </div>
        <div class="bar-item">
          <div class="bar-header"><span>직접</span><span>25%</span></div>
          <div class="bar-bg"><div class="bar-fill" style="width:25%"></div></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
